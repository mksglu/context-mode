name: Prebuild better-sqlite3

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prebuild-linux-glibc:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js 20
        run: |
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          yum install -y nodejs
      - name: Build better-sqlite3
        run: |
          npm install better-sqlite3 --build-from-source
          mkdir -p prebuilds/linux-x64
          cp node_modules/better-sqlite3/build/Release/better_sqlite3.node prebuilds/linux-x64/
          strip prebuilds/linux-x64/better_sqlite3.node
      - name: Verify binary
        run: |
          node -e "
            const bs3 = require('better-sqlite3');
            const db = new bs3(':memory:');
            db.exec('CREATE VIRTUAL TABLE t USING fts5(c)');
            db.prepare('INSERT INTO t VALUES(?)').run('hello');
            console.log('FTS5 OK');
            db.close();
          "
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-linux-x64
          path: prebuilds/

  prebuild-linux-musl:
    runs-on: ubuntu-latest
    container:
      image: node:20-alpine
    steps:
      - uses: actions/checkout@v4
      - run: apk add --no-cache build-base python3 git
      - name: Build better-sqlite3
        run: |
          npm install better-sqlite3 --build-from-source
          mkdir -p prebuilds/linux-x64-musl
          cp node_modules/better-sqlite3/build/Release/better_sqlite3.node prebuilds/linux-x64-musl/
          strip prebuilds/linux-x64-musl/better_sqlite3.node
      - name: Verify binary
        run: |
          node -e "
            const bs3 = require('better-sqlite3');
            const db = new bs3(':memory:');
            db.exec('CREATE VIRTUAL TABLE t USING fts5(c)');
            db.prepare('INSERT INTO t VALUES(?)').run('hello');
            console.log('FTS5 OK');
            db.close();
          "
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-linux-x64-musl
          path: prebuilds/

  package:
    needs: [prebuild-linux-glibc, prebuild-linux-musl]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: prebuilds/
          merge-multiple: true
      - name: Verify prebuilds
        run: |
          echo "=== Prebuilt binaries ==="
          find prebuilds/ -name '*.node' -exec ls -lh {} \;
          echo "=== Expected platforms ==="
          for dir in linux-x64 linux-x64-musl; do
            if [ -f "prebuilds/$dir/better_sqlite3.node" ]; then
              echo "  ✓ $dir"
            else
              echo "  ✗ $dir MISSING" && exit 1
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: all-prebuilds
          path: prebuilds/

  # CI publish on tag push (Option A)
  # IMPORTANT: Requires NPM_TOKEN secret to be configured on the repo.
  # @mksglu (repo owner) or @flightlesstux should add the NPM_TOKEN
  # secret via: Settings → Secrets and variables → Actions → New repository secret
  publish:
    needs: [package]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: all-prebuilds
          path: prebuilds/
      - name: Verify prebuilds included
        run: |
          echo "=== Prebuilds to publish ==="
          find prebuilds/ -name '*.node' -exec ls -lh {} \;
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
